<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ring Rave | Neon Arcade</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <div class="stars"> </div>

  <header class="hero">
    <nav>
      <div class="logo">
        <img src="assets/ringrave_final_logo.png" alt="Ring Rave" style="width: 200px;">
      </div>
    </nav>

    <div class="hero-content">
      <div class="hero-text">
        <h1>Coming Soon</h1>
        <p>
          Destroy shapes in this neon-infused physics arcade game and experience the new idle zen mode.
        </p>

        <div class="hero-buttons">
          <a href="https://www.tiktok.com/@piggy.bank.hq" class="btn primary" target="_blank">
            <i class="fa-brands fa-tiktok"></i> Follow on TikTok
          </a>
        </div>
      </div>

      <div id="visual-container" class="hero-visual">
        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="ring ring3"></div>
        <div class="ring ring4"></div>
        <div class="core"></div>
      </div>
    </div>
  </header>

  <footer>
    <div class="company-footer">
      <img src="assets/piggybank_logo.png" style="opacity: 0.5;" width="80px" alt="Company Logo" class="tiny-logo">
    </div>
  </footer>
</body>
</html>
