<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback | Ring Rave Support</title>
  <meta name="description" content="Encountered a bug or have a feature request for Ring Rave? Submit your feedback directly to the developer team here.">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <div class="stars"></div>

  <nav class="navbar">
    <div class="logo-container">
      <a href="index.html">
        <img src="assets/ringrave_final_logo.png" alt="Ring Rave Main Logo" class="main-logo">
      </a>
    </div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="gameplay.html">Gameplay</a>
      <a href="feedback.html" class="active">Feedback</a>
    </div>
  </nav>


  <main class="hero-container">
    <section class="hero-text feedback-container">
      <span class="badge">Player Support</span>
      <h1>Send Feedback</h1>
      <p>Encountered a bug or have an awesome feature request? Drop it down below and let us know!</p>

      <form action="https://api.web3forms.com/submit" method="POST" enctype="multipart/form-data" class="feedback-form">
        <input type="hidden" name="access_key" value="5aa4dc13-121e-4097-b9c3-dd8436fc8f61">
        <input type="hidden" name="redirect" value="https://piggybank.github.io/thanks.html">
        <input type="hidden" name="from_name" value="Ring Rave Feedback">
        <input type="checkbox" name="botcheck" class="hidden" style="display: none;">

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your Name" required>
        </div>

        <div class="form-group">
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject" value="RingRave feedback" readonly required>
        </div>

        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Tell us what you think..." required></textarea>
        </div>

        <button type="submit" class="btn submit-btn">
          <i class="fa-solid fa-paper-plane"></i> Submit Feedback
        </button>
      </form>
    </section>

    <section class="hero-visual" aria-hidden="true">
      <div class="ring-system" id="dynamic-ring-system">
        <!-- Will be dynamically generated via script.js -->
        <div class="core"></div>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Ring Rave Arcade. All rights reserved.</p>
    <div class="footer-links">
      <a href="index.html">Back to Home</a>
    </div>
  </footer>
</body>
</html>
